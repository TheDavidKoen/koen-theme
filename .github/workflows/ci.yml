name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php:
    name: PHP lint (WPCS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer
      - run: composer install --no-interaction --no-progress
      - run: composer lint

  assets:
    name: JS/CSS lint + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
